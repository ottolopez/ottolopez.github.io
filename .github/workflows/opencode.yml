name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install and Setup OpenCode
        run: |
          curl -fsSL https://opencode.ai/install | bash
          mkdir -p $HOME/.local/share/opencode
          echo '{"zai-coding-plan":{"key":"${{ secrets.OPENAI_API_KEY }}","type":"api"}}' > $HOME/.local/share/opencode/auth.json

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        with:
          model: zai-coding-plan/glm-4.7
          use_github_token: "true"
