<!DOCTYPE html>
<html>
<head>
    <title>Welcome</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            margin: 1em 0;
        }
        a {
            text-decoration: none;
            font-size: 1.5em;
            padding: 0.5em 1em;
            border: 1px solid #ccc;
            border-radius: 5px;
            color: #333;
        }
        a:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome</h1>
        <p>Please select a section:</p>
        <ul>
            <li><a href="/english/">English Site</a></li>
            <li><a href="/bible/">Bible Site</a></li>
        </ul>
    </div>
</body>
</html>
